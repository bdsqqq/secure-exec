[package]
name = "nanosandbox/wasix-runtime"
version = "0.1.0"
description = "WASIX runtime with Node.js shim for IPC-based Node execution"

[dependencies]
"wasmer/bash" = "*"
# Patched coreutils with pwd fix (wasmer/coreutils has canonicalize panic on WASI)
"nathanflurry/coreutils" = "0.1.0"

[[module]]
name = "wasix-runtime"
source = "target/wasm32-wasmer-wasi/release/wasix-runtime.wasm"
abi = "wasi"

[[command]]
name = "node"
module = "wasix-runtime"
runner = "wasi"
